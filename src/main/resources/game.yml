# ZTelegram Game Configuration
# Version 1.0

# Основные настройки игры
enabled: true
command:
  enabled: true

# Настройки награды
reward:
  amount: 5
  commands:
    - "eco give %player% 5"
    - "broadcast %player% выиграл в игру Угадай слово и получил 5 монет!"

# Настройки игры
settings:
  time_seconds: 60

# Сообщения игры
messages:
  game_start: "🎮 Игра \"Угадай слово\" началась!\n🎯 Угадайте слово: %word%\n⏱️ У вас есть %time% секунд!"
  game_win: "🎉 Поздравляем! Вы угадали слово: %word%\n🎁 Вы получили %reward% монет!"
  game_lose: "😢 Время вышло! Правильное слово: %word%\n🔄 Используйте /game для новой игры."
  already_playing: "❌ Вы уже играете! Сначала закончите текущую игру."
  not_registered: "❌ Вы не зарегистрированы! Сначала зарегистрируйтесь в канале регистрации."
  player_not_found: "❌ Игрок %player% не найден! Укажите правильный никнейм."

